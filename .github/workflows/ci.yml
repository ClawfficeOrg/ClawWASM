name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
      - "refactor/**"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  WASMEDGE_VERSION: "0.14.1"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-
      # `clawasm` (the Godot host crate) currently depends on `wasmedge-sys`
      # directly (non-optional), so even host-side clippy needs libwasmedge
      # available. Tracked in ralph/PLAN.md to make this dep optional and
      # routed through `clawasm-engine` in a follow-up.
      - name: Install WasmEdge ${{ env.WASMEDGE_VERSION }}
        run: |
          set -e
          curl -sSfL https://raw.githubusercontent.com/WasmEdge/WasmEdge/master/utils/install.sh \
            | bash -s -- --version=${WASMEDGE_VERSION} --path=$HOME/.wasmedge
          echo "$HOME/.wasmedge/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=$HOME/.wasmedge/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
          echo "WASMEDGE_DIR=$HOME/.wasmedge" >> $GITHUB_ENV
          echo "WASMEDGE_INCLUDE_DIR=$HOME/.wasmedge/include" >> $GITHUB_ENV
          echo "WASMEDGE_LIB_DIR=$HOME/.wasmedge/lib" >> $GITHUB_ENV
      # clippy on the host workspace (clawasm + clawasm-engine in stub mode).
      # The wasm-only `examples/hello-wasm` has its own workspace and is
      # exercised by the `wasm-smoke` job.
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      # Stub-mode test of clawasm-engine (no native WasmEdge required).
      - run: cargo test -p clawasm-engine --no-default-features
      # `cargo check -p clawasm` requires libwasmedge today (non-optional dep).
      # Install on Linux only; defer macOS host check to a future job once we
      # decide on a macOS WasmEdge install path. See ralph/PLAN.md.
      - name: Install WasmEdge ${{ env.WASMEDGE_VERSION }} (linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -e
          curl -sSfL https://raw.githubusercontent.com/WasmEdge/WasmEdge/master/utils/install.sh \
            | bash -s -- --version=${WASMEDGE_VERSION} --path=$HOME/.wasmedge
          echo "$HOME/.wasmedge/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=$HOME/.wasmedge/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
          echo "WASMEDGE_DIR=$HOME/.wasmedge" >> $GITHUB_ENV
          echo "WASMEDGE_INCLUDE_DIR=$HOME/.wasmedge/include" >> $GITHUB_ENV
          echo "WASMEDGE_LIB_DIR=$HOME/.wasmedge/lib" >> $GITHUB_ENV
      - name: cargo check -p clawasm (linux)
        if: matrix.os == 'ubuntu-latest'
        run: cargo check -p clawasm

  wasm-smoke:
    name: wasm32-wasip1 smoke (WasmEdge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            examples/hello-wasm/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('examples/hello-wasm/Cargo.lock', 'examples/hello-wasm/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-
      - name: Install WasmEdge ${{ env.WASMEDGE_VERSION }}
        run: |
          set -e
          curl -sSfL https://raw.githubusercontent.com/WasmEdge/WasmEdge/master/utils/install.sh \
            | bash -s -- --version=${WASMEDGE_VERSION} --path=$HOME/.wasmedge
          echo "$HOME/.wasmedge/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=$HOME/.wasmedge/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
          echo "WASMEDGE_DIR=$HOME/.wasmedge" >> $GITHUB_ENV
          echo "WASMEDGE_INCLUDE_DIR=$HOME/.wasmedge/include" >> $GITHUB_ENV
          echo "WASMEDGE_LIB_DIR=$HOME/.wasmedge/lib" >> $GITHUB_ENV
          $HOME/.wasmedge/bin/wasmedge --version
      - name: Build hello-wasm (wasm32-wasip1, release)
        run: cargo build --manifest-path examples/hello-wasm/Cargo.toml --target wasm32-wasip1 --release
      - name: Run hello-wasm under WasmEdge
        run: bash scripts/test-wasm.sh

  # Optional: full clawasm-engine test against a real WasmEdge install.
  # Currently `continue-on-error` while the engine integration is being
  # implemented (see ralph/PLAN.md "Up next"). Promote to a required check
  # once the engine has been green for two consecutive weeks.
  engine-with-wasmedge:
    name: clawasm-engine (with-wasmedge)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-engine-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-engine-
      - name: Install WasmEdge ${{ env.WASMEDGE_VERSION }}
        run: |
          set -e
          curl -sSfL https://raw.githubusercontent.com/WasmEdge/WasmEdge/master/utils/install.sh \
            | bash -s -- --version=${WASMEDGE_VERSION} --path=$HOME/.wasmedge
          echo "$HOME/.wasmedge/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=$HOME/.wasmedge/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
          echo "WASMEDGE_DIR=$HOME/.wasmedge" >> $GITHUB_ENV
          echo "WASMEDGE_INCLUDE_DIR=$HOME/.wasmedge/include" >> $GITHUB_ENV
          echo "WASMEDGE_LIB_DIR=$HOME/.wasmedge/lib" >> $GITHUB_ENV
      - run: cargo test -p clawasm-engine --features with-wasmedge

  conventional-commits:
    name: PR title is Conventional Commit
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            ci
            build
            refactor
            test
            perf
            style
            revert
