name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
      - "refactor/**"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  WASMEDGE_VERSION: "0.14.1"
  GODOT_VERSION: "4.6.2"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-
      # Lint the host workspace (`clawasm` + `clawasm-engine`) in stub mode.
      # The wasm-only `examples/hello-wasm` has its own workspace and is
      # exercised by the `wasm-smoke` job. The `with-wasmedge` feature is
      # exercised separately by `engine-with-wasmedge` below.
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      # Stub-mode tests/checks for the host workspace (no native WasmEdge).
      - run: cargo test -p clawasm-engine --no-default-features
      - run: cargo check -p clawasm

  wasm-smoke:
    name: wasm32-wasip1 smoke (WasmEdge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            examples/hello-wasm/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('examples/hello-wasm/Cargo.lock', 'examples/hello-wasm/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-
      - name: Install WasmEdge ${{ env.WASMEDGE_VERSION }}
        run: |
          set -e
          curl -sSfL https://raw.githubusercontent.com/WasmEdge/WasmEdge/master/utils/install.sh \
            | bash -s -- --version=${WASMEDGE_VERSION} --path=$HOME/.wasmedge
          echo "$HOME/.wasmedge/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=$HOME/.wasmedge/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
          echo "WASMEDGE_DIR=$HOME/.wasmedge" >> $GITHUB_ENV
          echo "WASMEDGE_INCLUDE_DIR=$HOME/.wasmedge/include" >> $GITHUB_ENV
          echo "WASMEDGE_LIB_DIR=$HOME/.wasmedge/lib" >> $GITHUB_ENV
          $HOME/.wasmedge/bin/wasmedge --version
      - name: Build hello-wasm (wasm32-wasip1, release)
        run: cargo build --manifest-path examples/hello-wasm/Cargo.toml --target wasm32-wasip1 --release
      - name: Run hello-wasm under WasmEdge
        run: bash scripts/test-wasm.sh

  # Full clawasm-engine test against a real WasmEdge install. Builds the
  # `examples/hello-wasm` artifact first, then runs the feature-gated
  # integration test that loads it and asserts the output. Required since
  # the v0.2.0 engine MVP shipped (subprocess-based runner).
  engine-with-wasmedge:
    name: clawasm-engine (with-wasmedge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            examples/hello-wasm/target
          key: ${{ runner.os }}-cargo-engine-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-engine-
      - name: Install WasmEdge ${{ env.WASMEDGE_VERSION }}
        run: |
          set -e
          curl -sSfL https://raw.githubusercontent.com/WasmEdge/WasmEdge/master/utils/install.sh \
            | bash -s -- --version=${WASMEDGE_VERSION} --path=$HOME/.wasmedge
          echo "$HOME/.wasmedge/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=$HOME/.wasmedge/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
          echo "WASMEDGE_DIR=$HOME/.wasmedge" >> $GITHUB_ENV
          echo "WASMEDGE_INCLUDE_DIR=$HOME/.wasmedge/include" >> $GITHUB_ENV
          echo "WASMEDGE_LIB_DIR=$HOME/.wasmedge/lib" >> $GITHUB_ENV
      - name: Build hello-wasm artifact (needed by integration smoke)
        run: cargo build --manifest-path examples/hello-wasm/Cargo.toml --target wasm32-wasip1 --release
      - run: cargo test -p clawasm-engine --features with-wasmedge

  # End-to-end headless Godot smoke: builds the cdylib + hello-wasm,
  # spins up Godot 4.6.2 headlessly, and asserts stdout/exit signals.
  godot-smoke:
    name: Godot headless smoke (ClawEngine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            examples/hello-wasm/target
          key: ${{ runner.os }}-cargo-godot-smoke-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-godot-smoke-

      # Godot headless needs mesa/gles for even --headless rendering init
      - name: Install system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libgles2 libdbus-1-3 libfontconfig1

      - name: Install WasmEdge ${{ env.WASMEDGE_VERSION }}
        run: |
          set -e
          curl -sSfL https://raw.githubusercontent.com/WasmEdge/WasmEdge/master/utils/install.sh \
            | bash -s -- --version=${WASMEDGE_VERSION} --path=$HOME/.wasmedge
          echo "$HOME/.wasmedge/bin" >> $GITHUB_PATH

      - name: Download Godot ${{ env.GODOT_VERSION }}
        run: |
          set -e
          ZIP="Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -sSfL \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${ZIP}" \
            -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          GODOT_EXE="/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64"
          chmod +x "$GODOT_EXE"
          echo "GODOT_BIN=$GODOT_EXE" >> $GITHUB_ENV

      - name: Build clawasm cdylib (release)
        run: cargo build -p clawasm --release

      - name: Build hello-wasm (wasm32-wasip1, release)
        run: cargo build --manifest-path examples/hello-wasm/Cargo.toml --target wasm32-wasip1 --release

      - name: Set up smoke project
        run: |
          set -e
          SMOKE=/tmp/clawasm-smoke
          mkdir -p "$SMOKE/addons/clawasm" "$SMOKE/modules" "$SMOKE/.godot"
          cp target/release/libclawasm.so              "$SMOKE/addons/clawasm/"
          cp examples/hello-wasm/target/wasm32-wasip1/release/hello-wasm.wasm \
                                                       "$SMOKE/modules/"
          cp clawasm.gdextension                       "$SMOKE/"
          cp tests/godot-smoke/project_headless.godot  "$SMOKE/project.godot"
          cp tests/godot-smoke/main_headless.tscn      "$SMOKE/"
          cp tests/godot-smoke/main_headless.gd        "$SMOKE/"
          echo 'res://clawasm.gdextension' > "$SMOKE/.godot/extension_list.cfg"

      - name: Run Godot headless smoke
        run: |
          set -e
          OUTPUT=$(WASMEDGE_BIN="$HOME/.wasmedge/bin/wasmedge" \
            "$GODOT_BIN" --headless --path /tmp/clawasm-smoke 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qF '[wasm] hello-wasm'
          echo "$OUTPUT" | grep -qF '[wasm] exit 0'

  conventional-commits:
    name: PR title is Conventional Commit
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            ci
            build
            refactor
            test
            perf
            style
            revert
