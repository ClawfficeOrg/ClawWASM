name: Feature request
description: Propose new behaviour.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need is unmet today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: phase
    attributes:
      label: Roadmap phase
      description: Which milestone in `docs/TODO.md`?
      options:
        - v0.2.0 — Networking & Hub connectivity
        - v0.3.0 — Persistence & Session management
        - v0.4.0 — Host integrations
        - v1.0.0 — Production readiness
        - Unsure
    validations:
      required: true
